video_type: conveyor_v2
seed: 12345

render:
  resolution: [448, 448]
  fps: 8

timing:
  step_duration_range: [0.75, 1.50]
  per_sequence_offset: { S1: 0.0, S2: 0.0, S3: 0.0 }

variants:
  per_job: 1
  mapping_resample: true

scene:
  belts: 3
  belt_speed: 0.70
  item_scale: 0.11
  scanner_y: 0.40
  scanner_flash_seconds: 0.00

sequences: [S1, S2, S3]
share_tokens: false

vocab:
  fallback:
    type: procedural.sculpture2d.composite
    params:
      palette: { choice: [[210,210,220],[240,200,180],[180,220,200],[200,170,240],[150,210,230],[220,180,150],[190,210,120],[120,190,210],[240,120,120],[120,240,120],[120,120,240],[240,200,120],[120,200,240],[200,120,240]] }
      lobes: { randint: [6, 14] }
      jitter: { uniform: [0.05, 0.14] }
      base_radius: { uniform: [0.16, 0.36] }
      rot: { uniform: [0.0, 6.28318] }
      count: { randint: [2, 4] }
      offset_scale: { uniform: [0.25, 0.45] }
  mapping: {}

rules:
  - name: conveyor_interleaver
    params: { seq_ids: [S1, S2, S3], mode: split, seq_to_lane: {S1: 0, S2: 1, S3: 2}, belts: 3, default_lane: 0 }
  - name: spawn_spacing
    params: { min_gap_seconds: 0.18, default_lane: 0 }
