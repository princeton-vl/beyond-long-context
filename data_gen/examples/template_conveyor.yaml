video_type: conveyor_v2
seed: 12345

render:
  resolution: [448, 448]
  fps: 1

sequences: [S1]

timing:
  # Random spacing per token; adjust to hit desired duration
  step_duration_range: [0.5, 2.75]
  per_sequence_offset: { S1: 0.0 }

variants:
  per_job: 1
  mapping_resample: true

scene:
  belts: 3
  belt_speed: 0.6
  item_scale: 0.11
  scanner_y: 0.40
  scanner_flash_seconds: 0.10

vocab:
  # Mapping from token→visual. If a token is not in mapping, fallback is used.
  fallback:
    type: procedural.sculpture2d.composite
    params:
      palette: { choice: [[210,210,220],[240,200,180],[180,220,200],[200,170,240],[150,210,230],[220,180,150],[190,210,120],[120,190,210],[240,120,120],[120,240,120],[120,120,240],[240,200,120],[120,200,240],[200,120,240]] }
      lobes: { randint: [6, 14] }
      jitter: { uniform: [0.05, 0.14] }
      base_radius: { uniform: [0.16, 0.36] }
      rot: { uniform: [0.0, 6.28318] }
      count: { randint: [2, 4] }
      offset_scale: { uniform: [0.25, 0.45] }
  mapping:
    {}

rules:
  - name: lane_policy_markov
    params: { belts: 3, p_same: 0.75 }
  - name: spawn_spacing
    params: { min_gap_seconds: 0.18, default_lane: 0 }
