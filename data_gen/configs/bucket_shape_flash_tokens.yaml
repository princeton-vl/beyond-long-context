step_profiles:
  LONG_FORM:
    step_range: [2.1, 3.1]
    fps: 1
    num_questions: 100

buckets:
  - id: FLASH_L030_512_ELOW
    seq_len: {min: 30, max: 512}
    entropy: {min: 0.0, max: 0.55, units: bits}
    max_prefix_len: 8
    rule_mode: probabilistic
    target_sequences: 2500
    target_videos: 2500
    step_profile: LONG_FORM
    vocab_size: 16
    disable_entropy_drop_guard: true

  - id: FLASH_L030_512_MED
    seq_len: {min: 30, max: 512}
    entropy: {min: 1.5, max: 2.5, units: bits}
    max_prefix_len: 8
    rule_mode: probabilistic
    target_sequences: 2500
    target_videos: 2500
    step_profile: LONG_FORM
    vocab_size: 16

  - id: FLASH_L030_512_NO_RULES
    seq_len: {min: 30, max: 512}
    entropy: {min: 3.9, max: 4.1, units: bits}
    max_prefix_len: 8
    rule_mode: probabilistic
    max_rules: 0
    target_sequences: 2500
    target_videos: 2500
    step_profile: LONG_FORM
    vocab_size: 16

  - id: FLASH_L512_3072_ELOW
    seq_len: {min: 512, max: 3072}
    entropy: {min: 0.0, max: 0.55, units: bits}
    max_prefix_len: 8
